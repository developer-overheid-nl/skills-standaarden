name: Monitoring - Broken Links

on:
  schedule:
    - cron: '0 6 * * *'  # dagelijks 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installeer uv
        uses: astral-sh/setup-uv@v5

      - name: Extraheer URLs uit skill-bestanden
        run: |
          uv run python scripts/extract_urls.py \
            --skills-dir skills/ \
            --output /tmp/urls.txt \
            --format lychee

      - name: Link check met Lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .lychee.toml
            --no-progress
            /tmp/urls.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          output: /tmp/lychee-report.md
          fail: false

      - name: Verwerk resultaten
        if: steps.lychee.outputs.exit_code != 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Broken links gevonden"
          cat /tmp/lychee-report.md

          # Zoek bestaande open issue
          existing=$(gh issue list \
            --label "monitoring,broken-link" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          title="[monitoring] Broken links gedetecteerd ($(date -I))"
          body="## Broken Links Rapport

          Automatische link check van $(date -I) heeft broken links gevonden.

          <details>
          <summary>Lychee rapport</summary>

          $(cat /tmp/lychee-report.md)

          </details>

          **Actie:** controleer de broken links en pas SKILL.md/reference.md aan indien nodig."

          if [ -n "$existing" ]; then
            echo "Update bestaande issue #$existing"
            gh issue comment "$existing" --body "$body"
          else
            echo "Maak nieuwe issue aan"
            gh issue create \
              --title "$title" \
              --body "$body" \
              --label "monitoring,broken-link"
          fi

      - name: Sluit issue als alles OK
        if: steps.lychee.outputs.exit_code == 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list \
            --label "monitoring,broken-link" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -n "$existing" ]; then
            echo "Alle links OK - sluit issue #$existing"
            gh issue close "$existing" \
              --comment "Alle links zijn weer bereikbaar ($(date -I)). Issue automatisch gesloten."
          fi
